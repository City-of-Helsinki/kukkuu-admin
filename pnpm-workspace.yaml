# Block installation of dependencies released less than 1 week ago (supply-chain hardening)
minimumReleaseAge: 10080

# Allow build/postinstall scripts only for dependencies that genuinely need them.
# (pnpm blocks all build scripts by default; yarn used to run them unconditionally.)
allowBuilds:
  # Vite's bundler – required for dev server, build and tests
  esbuild: true
  # ICU/locale data for the fi-FI browser-test toolchain
  full-icu: true
  # ffmpeg binary used by TestCafe --video recording in browser-test CI.
  # Listed per platform: darwin-arm64 for local dev, linux-x64 for CI.
  '@ffmpeg-installer/darwin-arm64': true
  '@ffmpeg-installer/linux-x64': true
  # core-js@2 postinstall only prints a funding message – not needed.
  core-js: false

# Translated from the former package.json "resolutions" field
overrides:
  '@types/minimatch': ^5.1.2
  lodash: ^4.18.1
  underscore: ^1.13.8
